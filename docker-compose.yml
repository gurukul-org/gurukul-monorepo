services:
  # NestJS Backend API Service
  api:
    image: ${API_IMAGE:-bharat1508/gurukul-api:staging}
    container_name: gurukul_api
    restart: always
    ports:
      - '8000:8000'
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - AT_SECRET=${AT_SECRET}
      - RT_SECRET=${RT_SECRET}
      - APP_DOMAIN=${APP_DOMAIN}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN}
      # Redis connection used by BullMQ for background jobs (e.g. student CSV import)
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    # Postgres is NOT a compose service in staging/prod (managed external DB via
    # the hosted_db network in docker-compose.prod.yml). The local `postgres`
    # dependency is added by docker-compose.dev.yml only; declaring it here would
    # make the prod project invalid ("undefined service postgres").
    depends_on:
      redis:
        condition: service_healthy

  # Redis — backing store for BullMQ job queues
  redis:
    image: redis:7-alpine
    container_name: gurukul_redis
    restart: always
    ports:
      - '6379:6379' # Exposes Redis for local inspection
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # Next.js Frontend Web Service
  web:
    image: ${WEB_IMAGE:-bharat1508/gurukul-web:staging}
    container_name: gurukul_web
    restart: always
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - api

# Named volumes for persistent container data
volumes:
  postgres_data:
  redis_data:
