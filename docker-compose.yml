services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:16-alpine
    container_name: gurukul_postgres
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    ports:
      - "5432:5432" # Exposes DB port to local machine for external GUI clients
    volumes:
      - postgres_data:/var/lib/postgresql/data # Persists database storage
    healthcheck:
      # Verifies PostgreSQL is ready to receive connections before starting dependent containers
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Web-based database management tool (Adminer)
  adminer:
    image: adminer:latest
    container_name: gurukul_adminer
    restart: always
    ports:
      - "8080:8080" # Web UI accessible at http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy

  # NestJS Backend API Service
  api:
    container_name: gurukul_api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      - AT_SECRET=${AT_SECRET}
      - RT_SECRET=${RT_SECRET}
      - APP_DOMAIN=${APP_DOMAIN}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN}
      # Redis connection used by BullMQ for background jobs (e.g. student CSV import)
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Redis — backing store for BullMQ job queues
  redis:
    image: redis:7-alpine
    container_name: gurukul_redis
    restart: always
    ports:
      - "6379:6379" # Exposes Redis for local inspection
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Next.js Frontend Web Service
  web:
    container_name: gurukul_web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      # Backend API URL for frontend communication
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api

# Named volumes for persistent container data
volumes:
  postgres_data:
  redis_data:
