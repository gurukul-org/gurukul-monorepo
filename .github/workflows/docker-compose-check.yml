name: docker-compose-check

on:
  pull_request:
    # Feature PRs target main; the promotion PR targets production.
    branches: [main, production]

jobs:
  docker-compose-check:
    name: docker compose up --build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Use both base + dev overlay so postgres + adminer come up alongside
      # the locally-built api + web (base file's default image points to
      # Docker Hub and would try to pull without the dev overlay).
      COMPOSE_FILE: docker-compose.yml:docker-compose.dev.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate ephemeral CI credentials
        run: |
          {
            echo "POSTGRES_USER=postgres"
            echo "POSTGRES_PASSWORD=$(openssl rand -hex 16)"
            echo "POSTGRES_DB=gurukul_ci"
            echo "AT_SECRET=$(openssl rand -hex 32)"
            echo "RT_SECRET=$(openssl rand -hex 32)"
          } >> "$GITHUB_ENV"

      - name: Build and start the stack
        run: docker compose up --build -d

      - name: Wait for all containers to reach running state (max 60s)
        run: |
          set -euo pipefail
          CONTAINERS=(gurukul_postgres gurukul_adminer gurukul_api gurukul_web)
          DEADLINE=$((SECONDS + 60))
          while :; do
            bad=()
            for c in "${CONTAINERS[@]}"; do
              status=$(docker inspect --format '{{.State.Status}}' "$c" 2>/dev/null || echo "missing")
              if [ "$status" != "running" ]; then
                bad+=("$c=$status")
              fi
            done
            if [ ${#bad[@]} -eq 0 ]; then
              echo "All containers reached running state."
              break
            fi
            if [ $SECONDS -ge $DEADLINE ]; then
              echo "::error::Containers did not reach running state within 60s: ${bad[*]}"
              exit 1
            fi
            echo "Still waiting (bad: ${bad[*]})"
            sleep 5
          done

      - name: Settle for 30s and re-check (catches late crash loops)
        run: |
          set -euo pipefail
          sleep 30
          CONTAINERS=(gurukul_postgres gurukul_adminer gurukul_api gurukul_web)
          bad=()
          for c in "${CONTAINERS[@]}"; do
            status=$(docker inspect --format '{{.State.Status}}' "$c" 2>/dev/null || echo "missing")
            restarting=$(docker inspect --format '{{.State.Restarting}}' "$c" 2>/dev/null || echo "true")
            exit_code=$(docker inspect --format '{{.State.ExitCode}}' "$c" 2>/dev/null || echo "?")
            if [ "$status" != "running" ] || [ "$restarting" = "true" ]; then
              bad+=("$c[status=$status,restarting=$restarting,exit=$exit_code]")
            fi
          done
          if [ ${#bad[@]} -ne 0 ]; then
            echo "::error::Containers unstable after 30s settle: ${bad[*]}"
            exit 1
          fi
          echo "All containers stable after settle."

      - name: Dump container logs (only on failure)
        if: failure()
        run: docker compose logs --tail=300 --no-color

      - name: Tear down
        if: always()
        run: docker compose down -v --remove-orphans

  # Lint the prod overlay so a syntax error in docker-compose.prod.yml is
  # caught on PR, not on the VPS. Uses dummy env values just to satisfy
  # variable substitution — we only care that `config` renders cleanly.
  prod-overlay-lint:
    name: prod overlay lint
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Generate dummy env
        run: |
          {
            echo "API_IMAGE=bharat1508/gurukul-api:staging"
            echo "WEB_IMAGE=bharat1508/gurukul-web:staging"
            echo "API_HOST_PORT=8001"
            echo "WEB_HOST_PORT=3001"
            echo "DATABASE_URL=postgresql://x:y@postgresql:5432/z?schema=public"
            echo "AT_SECRET=dummy"
            echo "RT_SECRET=dummy"
            echo "APP_DOMAIN=example.com"
            echo "COOKIE_DOMAIN=.example.com"
          } > .env

      - name: Validate base + prod overlay
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml config -q

      - name: Validate prod overlay with migrate profile
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile migrate config -q
