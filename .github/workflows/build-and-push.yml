name: Build and push images

# Triggered on push to staging (main) or prod (production).
# Builds api + web in parallel, pushes to Docker Hub, then SSH-deploys to VPS.
# Deploy is chained inside the same workflow (not a separate workflow_run)
# so the "default branch quirk" of workflow_run doesn't silently skip deploys
# when the default branch flips from main → production.

on:
  push:
    branches: [main, production]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false # don't leave a floating tag pointing at a half-built image

jobs:
  # ─── Build api + web in parallel, push to Docker Hub ───────────────
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: true # if one leg fails, cancel the other so :staging|:prod doesn't split-brain
      matrix:
        app: [api, web]
    permissions:
      contents: read
    outputs:
      env_tag: ${{ steps.meta.outputs.env_tag }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute tags
        id: meta
        env:
          GH_REF: ${{ github.ref }}
        run: |
          short_sha=$(git rev-parse --short=7 HEAD)
          if [ "$GH_REF" = "refs/heads/production" ]; then
            env_tag=prod
          else
            env_tag=staging
          fi
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "env_tag=$env_tag"     >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            bharat1508/gurukul-${{ matrix.app }}:${{ steps.meta.outputs.env_tag }}
            bharat1508/gurukul-${{ matrix.app }}:sha-${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha,scope=${{ matrix.app }}-${{ steps.meta.outputs.env_tag }}
          cache-to: type=gha,scope=${{ matrix.app }}-${{ steps.meta.outputs.env_tag }},mode=max

  # ─── SSH into VPS, sync compose files, pull, migrate, up ───────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Resolve target env
        id: env
        env:
          GH_REF: ${{ github.ref }}
        run: |
          if [ "$GH_REF" = "refs/heads/production" ]; then
            echo "dir=/root/projects/gurukul/prod"    >> "$GITHUB_OUTPUT"
            echo "label=prod"                          >> "$GITHUB_OUTPUT"
          else
            echo "dir=/root/projects/gurukul/staging" >> "$GITHUB_OUTPUT"
            echo "label=staging"                       >> "$GITHUB_OUTPUT"
          fi

      # Diagnostic — dumps runner IP, DNS resolution, and TCP reach so we can
      # tell from CI logs whether the VPS is even reachable before scp/ssh
      # try to connect. `continue-on-error` so a failure here doesn't hide
      # the real scp/ssh error. Host/port print as *** (masked secrets).
      - name: Diagnose VPS reachability
        continue-on-error: true
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
        run: |
          set +e
          echo "== Runner public IP =="
          curl -s --max-time 5 https://api.ipify.org; echo
          echo
          echo "== DNS resolution of VPS_HOST =="
          getent hosts "$VPS_HOST"
          echo
          echo "== TCP connectivity: nc -zvw 10 =="
          nc -zvw 10 "$VPS_HOST" "$VPS_SSH_PORT"; echo "nc_exit=$?"
          echo
          echo "== TCP dial via /dev/tcp (5s) =="
          timeout 5 bash -c "exec 3<>/dev/tcp/$VPS_HOST/$VPS_SSH_PORT && head -c 200 <&3"; echo "banner_exit=$?"
          echo
          echo "== Ping (informational; often blocked by cloud firewalls) =="
          ping -c 2 -W 3 "$VPS_HOST"; echo "ping_exit=$?"
          echo
          echo "== traceroute last 5 hops (5s per hop) =="
          traceroute -w 5 -m 15 "$VPS_HOST" 2>&1 | tail -8 || true
          exit 0

      # Keep compose files on VPS in lockstep with the repo — otherwise a
      # schema change to docker-compose.prod.yml never reaches the box.
      - name: Sync compose files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: 'docker-compose.yml,docker-compose.prod.yml'
          target: ${{ steps.env.outputs.dir }}
          overwrite: true

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -euo pipefail
            cd ${{ steps.env.outputs.dir }}

            echo "== Pulling app images for ${{ steps.env.outputs.label }} =="
            docker compose pull
            docker compose --profile migrate pull

            echo "== Running Prisma migrations (one-shot) =="
            docker compose --profile migrate run --rm migrate

            echo "== Recreating api + web =="
            docker compose up -d --remove-orphans

            echo "== Label-scoped image prune (this project only) =="
            docker image prune -f --filter "label=com.docker.compose.project=$(basename ${{ steps.env.outputs.dir }})"

            echo "== Status =="
            docker compose ps
