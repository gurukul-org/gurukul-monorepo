services:
  # Local PostgreSQL — only in dev. On VPS we use the shared external one.
  postgres:
    image: postgres:16-alpine
    container_name: gurukul_postgres
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5

  # Local Adminer — only in dev.
  adminer:
    image: adminer:latest
    container_name: gurukul_adminer
    restart: always
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy

  # Build from source locally instead of pulling registry images.
  api:
    image: !reset null
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      # Override DATABASE_URL so local devs don't need it in .env — host is the local `postgres` service.
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: !reset null
    build:
      context: .
      dockerfile: apps/web/Dockerfile

volumes:
  postgres_data:
